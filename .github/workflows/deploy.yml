name: Deploy to Horizon (live)

# Pousse le thème du repo vers le thème LIVE Horizon à chaque push sur main.
# Sûr car le repo contient désormais Horizon.
on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'

concurrency:
  group: deploy-horizon
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme to live Horizon
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: |
          shopify theme push --live --allow-live --no-color
