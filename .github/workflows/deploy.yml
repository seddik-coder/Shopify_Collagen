name: Sync Horizon theme from Shopify

# Manuel uniquement (Actions → Run workflow).
# Récupère le thème LIVE (Horizon) depuis Shopify et le commit dans le repo,
# pour que le dépôt reflète le vrai site. Ne pousse RIEN vers Shopify : aucun risque d'écrasement.

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Pull live theme from Shopify
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: |
          mkdir -p horizon-theme
          shopify theme pull --live --path horizon-theme --no-color

      - name: Commit synced theme
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add horizon-theme
          git commit -m "Sync: thème Horizon récupéré depuis Shopify" || echo "Aucun changement"
          git push
